<!DOCTYPE html>
<html lang="bn" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<title>Service Site</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

#topLoading{
display:none;position:fixed;top:0;left:0;width:100%;
background:black;color:white;text-align:center;
padding:10px;z-index:9999;font-weight:bold;
}

.marquee{background:#fff;border:1px solid #000;overflow:hidden}
.marquee p{color:red;padding:10px;white-space:nowrap;animation:scroll 15s linear infinite}
@keyframes scroll{from{transform:translateX(100%)}to{transform:translateX(-100%)}}

.image-box{display:flex;gap:10px;padding:10px}
.image-box img{width:50%;aspect-ratio:4/6;border-radius:10px}

.section-title{padding:10px;border-bottom:3px solid red;margin:10px}

.service-box{background:pink;border:1px solid black;margin:10px;padding:10px;border-radius:10px}
.service-item{display:flex;justify-content:space-between;margin:10px 0;cursor:pointer}

.shake{animation:shake .4s}
@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

.messenger-box{display:none;background:#fff;margin:10px;padding:10px;border-radius:10px}
.input-area{display:none;margin-top:10px}
input[type=text]{width:100%;padding:10px}

.buy-btn{
width:90%;margin:20px auto;padding:15px;
background:#ff0066;color:white;border:none;
border-radius:30px;font-size:18px;
position:relative;overflow:hidden;
}
.buy-btn.loading::before{
content:"";
position:absolute;
left:0;top:0;height:100%;width:0%;
background:gold;
animation:buyLoad 2s linear forwards;
z-index:0;
}
.buy-btn span{position:relative;z-index:1}
@keyframes buyLoad{from{width:0%}to{width:100%}}

#paymentPage{display:none;padding:15px}

.payment-card{
background:#ff0055;color:white;padding:15px;border-radius:15px;
}
.white-box{
background:#fff;color:black;border-radius:15px;padding:15px;margin-top:15px;
}
.amount{color:green}

.submit-btn{
margin-top:15px;width:100%;padding:15px;
background:green;color:white;border:none;
border-radius:10px;font-size:18px;
position:relative;overflow:hidden;
}
.submit-btn.loading::before{
content:"";
position:absolute;
left:0;top:0;height:100%;width:0%;
background:red;
animation:loadBar 2s linear forwards;
z-index:0;
}
.submit-btn span{position:relative;z-index:1}
@keyframes loadBar{from{width:0%}to{width:100%}}

</style>
</head>

<body>

<div id="topLoading">Please Wait...</div>

<div id="mainPage">

<div class="marquee">
<p>আমার নাম সুরভী 😚 আমি ভিডিও কলে সার্ভিস দিয়ে থাকি 😘</p>
</div>

<div class="image-box">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhTFEF7weCUrBOFgSVePZK1du7rnRUkLsCYQM9rZSAaqmmUt_3_vEWPkRlLogk6D3sOTRQ5FayaFNt6J6zHt7St-Wf-p0CekETxYZ2L5qBkO2tb03JUIlqXkqYsxhsVs2CtsOmbg1VZ6bGJwoEcXqzn_cjYomYeXiD0SCZw52v2ppQ3S6C9MzcMYFlIpxmU/s640/WhatsApp%20Image%202026-05-02%20at%2004.56.40%20(1).jpeg">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhCZKnYgE_idUV7fwznkXuY3XRfTR2BMrNulZl4Aofom_1BFBGQJy39wI5mZk_x5Z3n5xfJzz8OlH7lVx9E0ko300MHmmPTR2tdyB9qkLFg9jT9YLZiGpQZNxUBqdqJ0zRqkYT_gk8JxMHQEE2NnEeVj7neeErT5V_RwM1QeXPqNuw5VGvuxa80mxTdHdGe/s640/WhatsApp%20Image%202026-05-02%20at%2004.56.40.jpeg">
</div>

<div class="section-title">কতক্ষণ সার্ভিস নিবেন:</div>

<div class="service-box" id="serviceBox">
<div onclick="selectService(150,0)">
৩ মিনিট - ১৫০ টাকা <input type="radio" name="service">
</div>
<div onclick="selectService(250,1)">
৫ মিনিট - ২৫০ টাকা <input type="radio" name="service">
</div>
<div onclick="selectService(400,2)">
১০ মিনিট - ৪০০ টাকা <input type="radio" name="service">
</div>
</div>

<div class="messenger-box" id="messengerBox">
<div class="section-title">মেসেঞ্জার বাছাই করুন:</div>

<div onclick="selectMessenger('WhatsApp',0)">
<input type="radio" name="msg"> WhatsApp
</div>
<div onclick="selectMessenger('Telegram',1)">
<input type="radio" name="msg"> Telegram
</div>
<div onclick="selectMessenger('Imo',2)">
<input type="radio" name="msg"> Imo
</div>

<div class="input-area" id="inputArea">
<p id="inputLabel" style="color:red;"></p>
<input type="text" id="userInput">
</div>
</div>

<button class="buy-btn" id="buyBtn" onclick="buyService()">
<span>সার্ভিস কিনুন</span>
</button>

</div>

<div id="paymentPage">

<h1 style="text-align:center">Payment</h1>

<div class="payment-card">

<div class="white-box">
<p style="display:flex;align-items:center;gap:5px;">
<img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjwMuzCYH0ZeGhyphenhyphenudwK_t6k3G7es_RXAZsP2t8WAeiiFKG9JZgQ1P03OLIgWhTzr1SBXHjK7X6Hm7axohRRVWrzl89FhkeUHZOUzFBTWn5exnCRvPT4vexNTuYIqqnmvAnpisj_epA358A8XGEIz3z2hN_rxRkanjdhh7crhzL9dcAvkAmBN7790JdRc5-K/s148/download.png" width="25">
<span style="color:red;font-weight:bold;">bKash</span>
</p>

<p>নাম্বার: 01936484407</p>
<p>পরিমাণ: <span id="amountText" class="amount"></span></p>
</div>

<p>TxnID দিন</p>
<input type="text" id="txnInput">
<div id="txnError" style="color:yellow;display:none;">⚠️ সঠিক ১০ সংখ্যার আইডি দিন</div>

<!-- NEW PROFESSIONAL MESSAGE -->
<div style="margin-top:15px;background:#fff;padding:12px;border-radius:10px;color:black;line-height:1.6">
<p id="userInfoText"></p>
</div>

<button class="submit-btn" id="submitBtn" onclick="submitOrder()">
<span>জমা দিন</span>
</button>

<!-- AUDIO -->
<div style="display:flex;align-items:center;gap:10px;margin-top:20px;background:#fff;padding:10px;border-radius:10px;">
<img src="YOUR_PROFILE_IMAGE_LINK" style="width:50px;height:50px;border-radius:50%;">
<audio controls style="width:100%;">
<source src="https://files.catbox.moe/8u5x9r.mp3" type="audio/mpeg">
</audio>
</div>

</div>
</div>

<script>

let selectedAmount=0;
let messengerName="";
let userValue="";

function selectService(amount,i){
document.getElementsByName("service")[i].checked=true;
selectedAmount=amount;
document.getElementById("messengerBox").style.display="block";
}

function selectMessenger(name,i){
document.getElementsByName("msg")[i].checked=true;
messengerName=name;
document.getElementById("inputArea").style.display="block";

// 🔥 Dynamic instruction
let text="";
if(name==="WhatsApp"){
text="আপনার WhatsApp নাম্বারটি নিচে লিখুন 👇";
}
else if(name==="Telegram"){
text="আপনার Telegram ইউজারনেমটি নিচে লিখুন 👇";
}
else{
text="আপনার Imo নাম্বারটি নিচে লিখুন 👇";
}

document.getElementById("inputLabel").innerText=text;
}

function buyService(){

let btn=document.getElementById("buyBtn");
btn.classList.add("loading");

let input=document.getElementById("userInput").value;

if(selectedAmount==0){return alert("সার্ভিস সিলেক্ট করুন")}
if(messengerName==""){return alert("মেসেঞ্জার সিলেক্ট করুন")}
if(input.trim()==""){return alert("তথ্য দিন")}

userValue=input;

document.getElementById("topLoading").style.display="block";

setTimeout(()=>{
document.getElementById("topLoading").style.display="none";
document.getElementById("mainPage").style.display="none";
document.getElementById("paymentPage").style.display="block";

document.getElementById("amountText").innerText=selectedAmount+" টাকা";

// 🔥 Professional message
document.getElementById("userInfoText").innerHTML=
"আপনার "+messengerName+" (<b>"+userValue+"</b>) আমরা পেয়েছি।<br><br>পেমেন্ট সম্পন্ন হওয়ার ৫ মিনিটের মধ্যে আপনাকে মেসেজ দেওয়া হবে।<br><br>সার্ভিস নেওয়ার জন্য ধন্যবাদ ❤️";

},2000);
}

function submitOrder(){

let txn=document.getElementById("txnInput").value.trim();
let error=document.getElementById("txnError");

let normalized = txn.replace(/[০-৯]/g, d => "০১২৩৪৫৬৭৮৯".indexOf(d));

if(normalized.length !== 10){
error.style.display="block";
return;
}else{
error.style.display="none";
}

let btn=document.getElementById("submitBtn");
btn.classList.add("loading");
btn.querySelector("span").innerText="জমা হচ্ছে...";

setTimeout(()=>{
window.location.href="https://www.profitablecpmratenetwork.com/d9ddk3mpd?key=a83df7bf6b76513961a1bd323c24892b";
},2000);
}

</script>

</body>
</html>
